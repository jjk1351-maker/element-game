<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원소기호 메모리 게임</title>
<style>
  :root{ --bg1:#6a11cb; --bg2:#2575fc; --gold:#ffd23f; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2)); background-attachment:fixed;
    min-height:100vh; color:#fff; overflow-x:hidden;}
  .wrap{max-width:820px; margin:0 auto; padding:16px;}
  header{text-align:center; padding:14px 0 6px;}
  header h1{margin:0; font-size:clamp(22px,6vw,34px); letter-spacing:-1px; text-shadow:0 3px 0 rgba(0,0,0,.18);}
  header p{margin:4px 0 0; font-size:13px; opacity:.85;}

  .screen{display:none; animation:fade .35s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* 이름 입력 */
  .namebox{display:flex; gap:8px; align-items:center; justify-content:center; margin:16px 0 4px; flex-wrap:wrap;}
  .namebox label{font-size:14px; opacity:.9;}
  .namebox input{padding:10px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.16); color:#fff; font-size:15px; font-weight:700; width:160px; text-align:center;}
  .namebox input::placeholder{color:rgba(255,255,255,.6);}
  .rank-link{text-align:center; margin:6px 0 0;}
  .rank-link button{background:rgba(0,0,0,.22); border:none; color:#fff; cursor:pointer;
    padding:9px 18px; border-radius:30px; font-weight:700; font-size:14px;}
  .rank-link button:active{transform:scale(.96);}

  /* 난이도 */
  .levels{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:16px;}
  .lvl-btn{border:none; cursor:pointer; border-radius:18px; padding:18px 12px; color:#fff;
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.25);
    transition:transform .12s, background .2s; text-align:center;}
  .lvl-btn:hover{transform:translateY(-3px); background:rgba(255,255,255,.24);}
  .lvl-btn:active{transform:scale(.96);}
  .lvl-btn .num{font-size:30px; font-weight:800; display:block; line-height:1;}
  .lvl-btn .desc{font-size:13px; opacity:.9; margin-top:6px; display:block;}
  .lvl-btn .pts{font-size:12px; margin-top:8px; display:inline-block; background:var(--gold);
    color:#5a3d00; font-weight:700; padding:3px 10px; border-radius:20px;}
  .lvl-btn .best{font-size:11px; margin-top:8px; opacity:.85; display:block;}

  /* HUD */
  .hud{display:flex; justify-content:space-between; align-items:center; gap:8px; margin:8px 0 14px; flex-wrap:wrap;}
  .hud .chip{background:rgba(255,255,255,.16); padding:8px 14px; border-radius:30px; font-weight:700; font-size:14px; display:flex; align-items:center; gap:6px;}
  .hud .chip b{font-size:18px;}
  .hud-btn{background:rgba(0,0,0,.22); border:none; color:#fff; cursor:pointer; padding:8px 14px; border-radius:30px; font-weight:700; font-size:14px;}
  .hud-btn:active{transform:scale(.95);}

  /* 보드 */
  .board{display:grid; gap:clamp(6px,1.6vw,12px); margin:0 auto; perspective:1000px;}
  .card{aspect-ratio:3/4; cursor:pointer; position:relative; transform-style:preserve-3d; transition:transform .45s;}
  .card.flipped{transform:rotateY(180deg);}
  .card.matched{animation:pop .4s ease; pointer-events:none;}
  @keyframes pop{0%{transform:rotateY(180deg) scale(1);}50%{transform:rotateY(180deg) scale(1.12);}100%{transform:rotateY(180deg) scale(1);}}
  .face{position:absolute; inset:0; border-radius:14px; backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.22); overflow:hidden;}
  .front{background:linear-gradient(135deg,#fbbf24,#f97316); color:#7c2d12; font-size:clamp(26px,8vw,46px);}
  .front::after{content:"?"; font-weight:800;}
  .back{transform:rotateY(180deg);}
  .back.sym{background:linear-gradient(135deg,#ffffff,#fff4e6); color:#9a3412;}
  .back.name{background:linear-gradient(135deg,#11998e,#38ef7d); color:#053b30;}
  .back .emoji{font-size:clamp(22px,7vw,38px); line-height:1;}
  .back .symbol{font-size:clamp(20px,7vw,40px); font-weight:800; margin-top:2px;}
  .back .nm{font-size:clamp(15px,5vw,26px); font-weight:800;}
  .back .anum{position:absolute; top:6px; left:8px; font-size:11px; font-weight:700; opacity:.65;}
  .matched .face{box-shadow:0 0 0 3px var(--gold), 0 4px 10px rgba(0,0,0,.22);}

  /* 랭킹 화면 */
  .rank-head{display:flex; justify-content:space-between; align-items:center; margin:8px 0 12px;}
  .rank-head h2{margin:0; font-size:20px;}
  .rank-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .rank-tabs button{flex:1; min-width:54px; background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.25);
    color:#fff; cursor:pointer; padding:9px 4px; border-radius:12px; font-weight:700; font-size:13px;}
  .rank-tabs button.on{background:var(--gold); color:#5a3d00; border-color:var(--gold);}
  .rank-list{background:rgba(255,255,255,.1); border-radius:16px; padding:8px; min-height:120px;}
  .rank-row{display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;}
  .rank-row:nth-child(odd){background:rgba(255,255,255,.07);}
  .rank-row .pos{width:30px; font-weight:800; font-size:16px; text-align:center;}
  .rank-row .nm{flex:1; font-weight:700;}
  .rank-row .sc{font-weight:800; color:var(--gold);}
  .rank-row .tm{font-size:12px; opacity:.7; width:54px; text-align:right;}
  .rank-empty,.rank-loading{text-align:center; padding:30px 10px; opacity:.8; font-size:14px;}

  /* 모달 */
  .modal{position:fixed; inset:0; background:rgba(10,5,40,.6); backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal.show{display:flex; animation:fade .3s;}
  .modal-box{background:#fff; color:#2b2b40; border-radius:24px; padding:28px 24px; text-align:center; max-width:360px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal-box .trophy{font-size:54px;}
  .modal-box h2{margin:6px 0 2px; font-size:24px;}
  .modal-box .score{font-size:46px; font-weight:800; color:#f97316; margin:8px 0 0;}
  .modal-box .sub{color:#777; font-size:14px; margin:2px 0 12px;}
  .modal-box .newbest{display:inline-block; background:var(--gold); color:#5a3d00; font-weight:800; padding:5px 14px; border-radius:20px; font-size:13px; margin-bottom:12px;}
  .modal-box .submitmsg{font-size:13px; color:#16a34a; font-weight:700; margin-bottom:12px; min-height:18px;}
  .modal-box .row{display:flex; gap:10px; margin-top:6px;}
  .mbtn{flex:1; border:none; cursor:pointer; padding:14px; border-radius:14px; font-weight:800; font-size:15px; color:#fff;}
  .mbtn.again{background:#f97316;} .mbtn.rank{background:#2575fc;} .mbtn.home{background:#6b7280;}
  .mbtn:active{transform:scale(.96);}

  .confetti{position:fixed; top:-12px; width:10px; height:16px; z-index:60; pointer-events:none;}
  footer{text-align:center; font-size:12px; opacity:.7; padding:18px 0; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚛️ 원소기호 메모리 게임</h1>
    <p>그림·기호 카드와 이름 카드를 짝지어 보세요! (1~20번 원소)</p>
  </header>

  <!-- 시작 화면 -->
  <section id="screen-home" class="screen active">
    <div class="namebox">
      <label>이름</label>
      <input id="playerName" maxlength="12" placeholder="이름을 입력하세요">
    </div>
    <div class="rank-link"><button id="openRankBtn">🏆 전체 랭킹 보기</button></div>
    <div class="levels" id="levels"></div>
  </section>

  <!-- 게임 화면 -->
  <section id="screen-game" class="screen">
    <div class="hud">
      <div class="chip">⏱️ <b id="timer">0.0</b>초</div>
      <div class="chip">🃏 <b id="found">0</b>/<span id="total">0</span></div>
      <div style="display:flex; gap:8px;">
        <button class="hud-btn" id="soundBtn">🔊</button>
        <button class="hud-btn" id="homeBtn">🏠 나가기</button>
      </div>
    </div>
    <div class="board" id="board"></div>
  </section>

  <!-- 랭킹 화면 -->
  <section id="screen-rank" class="screen">
    <div class="rank-head">
      <h2>🏆 랭킹</h2>
      <button class="hud-btn" id="rankHomeBtn">🏠 돌아가기</button>
    </div>
    <div class="rank-tabs" id="rankTabs"></div>
    <div class="rank-list" id="rankList"><div class="rank-loading">불러오는 중…</div></div>
  </section>
</div>

<!-- 결과 모달 -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="trophy" id="trophy">🏆</div>
    <h2 id="resultTitle">클리어!</h2>
    <div id="newbestBadge" class="newbest" style="display:none;">🎉 내 최고기록 갱신!</div>
    <div class="score"><span id="finalScore">0</span>점</div>
    <div class="sub" id="resultSub"></div>
    <div class="submitmsg" id="submitMsg"></div>
    <div class="row">
      <button class="mbtn again" id="againBtn">다시</button>
      <button class="mbtn rank" id="rankBtn">랭킹</button>
      <button class="mbtn home" id="toHomeBtn">난이도</button>
    </div>
  </div>
</div>

<footer>
  중학교 과학 · 원소기호 1~20번 학습용 · 점수는 클리어 시간으로 결정됩니다<br>
  랭킹 사용 시 아래 SCRIPT_URL에 본인의 Apps Script 웹앱 주소를 입력하세요
</footer>

<script>
/* ============================================================
 *  ⭐ 여기에 Apps Script 웹앱 URL을 붙여넣으세요 ⭐
 *  (비워두면 랭킹 기능은 꺼지고, 내 기기 최고점만 저장됩니다)
 * ============================================================ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA44LrJlbgkALdBLQBSf-f6u1PO0kVBs_ptBV952Iplqed8MRkgDNYiCMrWIdsopSn/exec";

/* ===== 원소 데이터 (1~20번) — 이름: 나트륨/칼륨 표기 ===== */
const ELEMENTS = [
  {n:1, sym:"H",  name:"수소",     emoji:"💧"},
  {n:2, sym:"He", name:"헬륨",     emoji:"🎈"},
  {n:3, sym:"Li", name:"리튬",     emoji:"🔋"},
  {n:4, sym:"Be", name:"베릴륨",   emoji:"💎"},
  {n:5, sym:"B",  name:"붕소",     emoji:"🧼"},
  {n:6, sym:"C",  name:"탄소",     emoji:"✏️"},
  {n:7, sym:"N",  name:"질소",     emoji:"💨"},
  {n:8, sym:"O",  name:"산소",     emoji:"🫁"},
  {n:9, sym:"F",  name:"플루오린", emoji:"🦷"},
  {n:10,sym:"Ne", name:"네온",     emoji:"🪧"},
  {n:11,sym:"Na", name:"나트륨",   emoji:"🧂"},
  {n:12,sym:"Mg", name:"마그네슘", emoji:"🌿"},
  {n:13,sym:"Al", name:"알루미늄", emoji:"✈️"},
  {n:14,sym:"Si", name:"규소",     emoji:"💻"},
  {n:15,sym:"P",  name:"인",       emoji:"🔥"},
  {n:16,sym:"S",  name:"황",       emoji:"🥚"},
  {n:17,sym:"Cl", name:"염소",     emoji:"🏊"},
  {n:18,sym:"Ar", name:"아르곤",   emoji:"💡"},
  {n:19,sym:"K",  name:"칼륨",     emoji:"🍌"},
  {n:20,sym:"Ca", name:"칼슘",     emoji:"🦴"},
];

/* ===== 난이도 ===== */
const LEVELS = [
  {lv:1, pairs:3,  cols:3, base:500,  target:25,  desc:"입문"},
  {lv:2, pairs:4,  cols:4, base:1000, target:40,  desc:"쉬움"},
  {lv:3, pairs:6,  cols:4, base:1500, target:60,  desc:"보통"},
  {lv:4, pairs:8,  cols:4, base:2000, target:90,  desc:"어려움"},
  {lv:5, pairs:10, cols:5, base:2500, target:130, desc:"마스터"},
];

let cur=null, deck=[], firstCard=null, lock=false, found=0, totalPairs=0;
let startTime=0, timerId=null, soundOn=true, lastResult=null;
const $=id=>document.getElementById(id);

/* ===== 사운드 ===== */
let actx=null;
function beep(freq,dur,type="sine",vol=.15){
  if(!soundOn) return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
const sFlip =()=>beep(420,.08,"triangle");
const sMatch=()=>{beep(660,.1,"sine");setTimeout(()=>beep(880,.14,"sine"),90);};
const sFail =()=>beep(180,.18,"sawtooth",.1);
const sWin  =()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.18,"sine"),i*120));};

/* ===== JSONP (CORS 없이 시트와 통신) ===== */
function jsonp(params){
  return new Promise((resolve,reject)=>{
    if(!SCRIPT_URL){ reject("no-url"); return; }
    const cb="cb_"+Date.now()+Math.floor(Math.random()*1000);
    const s=document.createElement("script");
    window[cb]=(data)=>{ resolve(data); delete window[cb]; s.remove(); };
    const qs=Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
    s.src=SCRIPT_URL+"?"+qs+"&callback="+cb;
    s.onerror=()=>{ reject("net-error"); delete window[cb]; s.remove(); };
    document.body.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ reject("timeout"); delete window[cb]; s.remove(); } },10000);
  });
}

/* ===== 이름 저장 ===== */
function loadName(){ return localStorage.getItem("elemMemName")||""; }
function saveName(v){ localStorage.setItem("elemMemName", v); }

/* ===== 난이도 화면 ===== */
function bestKey(lv){return "elemMemBest_lv"+lv;}
function getBest(lv){return parseInt(localStorage.getItem(bestKey(lv))||"0",10);}
function renderLevels(){
  $("levels").innerHTML="";
  LEVELS.forEach(L=>{
    const best=getBest(L.lv);
    const b=document.createElement("button");
    b.className="lvl-btn";
    b.innerHTML=`<span class="num">${L.lv}</span>
      <span class="desc">${L.desc} · 카드 ${L.pairs*2}장</span>
      <span class="pts">기본 ${L.base}점</span>
      <span class="best">🏅 내 최고 ${best.toLocaleString()}</span>`;
    b.onclick=()=>startGame(L);
    $("levels").appendChild(b);
  });
}

/* ===== 게임 ===== */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startGame(L){
  cur=L; found=0; firstCard=null; lock=false; totalPairs=L.pairs;
  const chosen=shuffle([...ELEMENTS]).slice(0,L.pairs);
  deck=[];
  chosen.forEach(el=>{ deck.push({el,type:"sym"}); deck.push({el,type:"name"}); });
  shuffle(deck);
  $("total").textContent=L.pairs; $("found").textContent=0; $("timer").textContent="0.0";
  const board=$("board");
  board.style.gridTemplateColumns=`repeat(${L.cols},1fr)`;
  board.innerHTML="";
  deck.forEach((c,i)=>{
    const card=document.createElement("div");
    card.className="card"; card.dataset.idx=i;
    const backHTML=c.type==="sym"
      ? `<div class="face back sym"><span class="anum">${c.el.n}</span><div class="emoji">${c.el.emoji}</div><div class="symbol">${c.el.sym}</div></div>`
      : `<div class="face back name"><div class="nm">${c.el.name}</div></div>`;
    card.innerHTML=`<div class="face front"></div>${backHTML}`;
    card.onclick=()=>flip(card,c);
    board.appendChild(card);
  });
  showScreen("game");
  startTime=0; clearInterval(timerId);
}
function flip(card,data){
  if(lock||card.classList.contains("flipped")||card.classList.contains("matched")) return;
  if(startTime===0){ startTime=Date.now(); timerId=setInterval(()=>{ $("timer").textContent=((Date.now()-startTime)/1000).toFixed(1); },100); }
  card.classList.add("flipped"); sFlip();
  if(!firstCard){ firstCard={card,data}; return; }
  lock=true;
  const a=firstCard.data, b=data;
  const isMatch=a.el.n===b.el.n && a.type!==b.type;
  if(isMatch){
    setTimeout(()=>{
      card.classList.add("matched"); firstCard.card.classList.add("matched"); sMatch();
      found++; $("found").textContent=found; firstCard=null; lock=false;
      if(found===totalPairs) finish();
    },350);
  }else{
    sFail();
    setTimeout(()=>{ card.classList.remove("flipped"); firstCard.card.classList.remove("flipped"); firstCard=null; lock=false; },900);
  }
}
function calcScore(seconds){
  const speedBonus=Math.max(0, Math.round((cur.target-seconds)*cur.lv*10));
  return cur.base+speedBonus;
}
function finish(){
  clearInterval(timerId);
  const seconds=(Date.now()-startTime)/1000;
  const score=calcScore(seconds);
  const best=getBest(cur.lv);
  const isNew=score>best;
  if(isNew) localStorage.setItem(bestKey(cur.lv), String(score));
  lastResult={lv:cur.lv, score, seconds};

  $("finalScore").textContent=score.toLocaleString();
  $("resultSub").textContent=`난이도 ${cur.lv} · 걸린 시간 ${seconds.toFixed(1)}초`;
  $("newbestBadge").style.display=isNew?"inline-block":"none";
  $("trophy").textContent= score>=cur.base+(cur.target*cur.lv*10*0.6) ? "🏆":"🎯";
  $("resultTitle").textContent=isNew?"신기록!":"클리어!";
  $("submitMsg").textContent="";

  setTimeout(()=>{ $("modal").classList.add("show"); sWin(); confetti(); submitScore(); },450);
}

/* ===== 점수 시트 등록 ===== */
function submitScore(){
  if(!SCRIPT_URL || !lastResult) return;
  const name=(loadName()||"익명").trim() || "익명";
  $("submitMsg").textContent="랭킹 등록 중…";
  jsonp({action:"add", name, level:lastResult.lv, score:lastResult.score, seconds:lastResult.seconds.toFixed(1)})
    .then(()=>{ $("submitMsg").textContent="✅ 랭킹에 등록되었습니다!"; })
    .catch(()=>{ $("submitMsg").textContent="⚠️ 랭킹 서버 연결 실패 (URL 확인)"; });
}

/* ===== 랭킹 화면 ===== */
let rankTab=1;
function renderRankTabs(){
  $("rankTabs").innerHTML="";
  LEVELS.forEach(L=>{
    const b=document.createElement("button");
    b.textContent="난이도 "+L.lv;
    b.className=(L.lv===rankTab)?"on":"";
    b.onclick=()=>{ rankTab=L.lv; renderRankTabs(); loadRanking(L.lv); };
    $("rankTabs").appendChild(b);
  });
}
function loadRanking(lv){
  const list=$("rankList");
  if(!SCRIPT_URL){
    list.innerHTML=`<div class="rank-empty">온라인 랭킹이 설정되지 않았어요.<br>HTML 파일의 <b>SCRIPT_URL</b>에<br>Apps Script 주소를 입력하면 켜집니다.</div>`;
    return;
  }
  list.innerHTML=`<div class="rank-loading">불러오는 중…</div>`;
  jsonp({action:"list", level:lv})
    .then(res=>{
      const rows=(res&&res.rankings)||[];
      if(!rows.length){ list.innerHTML=`<div class="rank-empty">아직 기록이 없어요. 1등이 되어보세요! 🥇</div>`; return; }
      const medal=["🥇","🥈","🥉"];
      list.innerHTML=rows.map((r,i)=>`
        <div class="rank-row">
          <div class="pos">${medal[i]||(i+1)}</div>
          <div class="nm">${escapeHtml(r.name)}</div>
          <div class="sc">${Number(r.score).toLocaleString()}점</div>
          <div class="tm">${Number(r.seconds).toFixed(1)}초</div>
        </div>`).join("");
    })
    .catch(()=>{ list.innerHTML=`<div class="rank-empty">⚠️ 랭킹을 불러오지 못했어요. URL을 확인하세요.</div>`; });
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ===== 색종이 ===== */
function confetti(){
  const colors=["#ff8c42","#38ef7d","#2575fc","#ffd23f","#ff5e7e","#a78bfa"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=Math.random()*100+"vw"; c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform=`rotate(${Math.random()*360}deg)`; document.body.appendChild(c);
    const fall=2000+Math.random()*1500, drift=(Math.random()-.5)*200;
    c.animate([{transform:`translate(0,0) rotate(0deg)`,opacity:1},
      {transform:`translate(${drift}px,105vh) rotate(${Math.random()*720}deg)`,opacity:.9}],
      {duration:fall, easing:"ease-in"});
    setTimeout(()=>c.remove(), fall);
  }
}

/* ===== 화면 전환 ===== */
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("screen-"+name).classList.add("active");
}

/* ===== 이벤트 ===== */
$("playerName").value=loadName();
$("playerName").addEventListener("input", e=>saveName(e.target.value));
$("homeBtn").onclick=()=>{ clearInterval(timerId); showScreen("home"); renderLevels(); };
$("toHomeBtn").onclick=()=>{ $("modal").classList.remove("show"); showScreen("home"); renderLevels(); };
$("againBtn").onclick=()=>{ $("modal").classList.remove("show"); startGame(cur); };
$("rankBtn").onclick=()=>{ $("modal").classList.remove("show"); rankTab=(lastResult?lastResult.lv:1); renderRankTabs(); showScreen("rank"); loadRanking(rankTab); };
$("openRankBtn").onclick=()=>{ renderRankTabs(); showScreen("rank"); loadRanking(rankTab); };
$("rankHomeBtn").onclick=()=>{ showScreen("home"); renderLevels(); };
$("soundBtn").onclick=function(){ soundOn=!soundOn; this.textContent=soundOn?"🔊":"🔇"; };

/* ===== 시작 ===== */
renderLevels();
</script>
